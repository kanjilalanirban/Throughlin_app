name: Frontend deploy (build + S3 sync)

# Builds the frontend bundle with VITE_API_URL injected from SSM, then
# syncs it to the per-stack frontend S3 bucket.
#
# Skip-with-warning if the ephemeral stack is down (SSM params not present).
# In that case, just `make up` first then re-trigger via the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  SSM_API_URL: /companybrain/phase0/alb/url
  SSM_FRONTEND_BUCKET: /companybrain/phase0/s3/frontend_bucket
  SSM_FRONTEND_URL: /companybrain/phase0/s3/frontend_url
  SSM_COGNITO_USER_POOL_ID: /companybrain/phase0/cognito/user_pool_id
  SSM_COGNITO_CLIENT_ID: /companybrain/phase0/cognito/client_id

jobs:
  deploy:
    name: build + sync frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IMAGE_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check ephemeral stack is up
        id: check
        run: |
          if aws ssm get-parameter --name "${SSM_API_URL}" > /dev/null 2>&1; then
            echo "stack_up=true" >> $GITHUB_OUTPUT
          else
            echo "stack_up=false" >> $GITHUB_OUTPUT
            echo "::warning::Ephemeral stack appears down (SSM parameter ${SSM_API_URL} not present). Skipping deploy. Bring the stack up and re-run this workflow."
          fi

      - name: Read API URL + bucket + Cognito IDs from SSM
        if: steps.check.outputs.stack_up == 'true'
        id: ssm
        run: |
          API_URL=$(aws ssm get-parameter --name "${SSM_API_URL}" --query Parameter.Value --output text)
          BUCKET=$(aws ssm get-parameter --name "${SSM_FRONTEND_BUCKET}" --query Parameter.Value --output text)
          FRONTEND_URL=$(aws ssm get-parameter --name "${SSM_FRONTEND_URL}" --query Parameter.Value --output text)
          COGNITO_POOL=$(aws ssm get-parameter --name "${SSM_COGNITO_USER_POOL_ID}" --query Parameter.Value --output text)
          COGNITO_CLIENT=$(aws ssm get-parameter --name "${SSM_COGNITO_CLIENT_ID}" --query Parameter.Value --output text)
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
          echo "frontend_url=${FRONTEND_URL}" >> $GITHUB_OUTPUT
          echo "cognito_pool=${COGNITO_POOL}" >> $GITHUB_OUTPUT
          echo "cognito_client=${COGNITO_CLIENT}" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.stack_up == 'true'
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        if: steps.check.outputs.stack_up == 'true'
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install + build
        if: steps.check.outputs.stack_up == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.ssm.outputs.api_url }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.ssm.outputs.cognito_pool }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.ssm.outputs.cognito_client }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Sync dist/ to S3
        if: steps.check.outputs.stack_up == 'true'
        working-directory: frontend
        run: |
          aws s3 sync dist/ "s3://${{ steps.ssm.outputs.bucket }}/" --delete

      - name: Summary
        if: steps.check.outputs.stack_up == 'true'
        run: |
          {
            echo "## Frontend deployed"
            echo ""
            echo '```'
            echo "Bucket:       ${{ steps.ssm.outputs.bucket }}"
            echo "API URL:      ${{ steps.ssm.outputs.api_url }}"
            echo "Frontend URL: ${{ steps.ssm.outputs.frontend_url }}"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
