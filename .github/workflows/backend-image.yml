name: Backend image (build + push + redeploy)

# Builds the backend container, pushes it to ECR as both `:latest` and
# `:sha-<short>`, and force-redeploys the Fargate service if the ephemeral
# stack is currently up. If the stack is down, the new image just sits in
# ECR and gets picked up at the next `make up`.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  ECR_REPO: companybrain-backend
  ECS_CLUSTER: companybrain-phase0-cluster
  ECS_SERVICE: companybrain-phase0-api

jobs:
  build:
    name: build + push + redeploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IMAGE_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        run: |
          ACCOUNT_ID="${{ steps.ecr.outputs.registry }}"
          REPO_URI="${ACCOUNT_ID}/${ECR_REPO}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "repo_uri=${REPO_URI}" >> $GITHUB_OUTPUT
          echo "tags=${REPO_URI}:latest,${REPO_URI}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Force ECS service redeploy (only if cluster is up)
        run: |
          set -e
          if aws ecs describe-services \
               --cluster "${ECS_CLUSTER}" \
               --services "${ECS_SERVICE}" \
               --query 'services[?status==`ACTIVE`].status' \
               --output text 2>/dev/null | grep -q ACTIVE; then
            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${ECS_SERVICE}" \
              --force-new-deployment > /dev/null
            echo "::notice::ECS redeploy triggered. New task will pull ${{ steps.tags.outputs.repo_uri }}:latest"
          else
            echo "::notice::Ephemeral stack is down. New image lives in ECR at ${{ steps.tags.outputs.repo_uri }}:latest (and :sha-${{ steps.tags.outputs.short_sha }}); will be picked up on next make up."
          fi

      - name: Summary
        run: |
          {
            echo "## Backend image"
            echo ""
            echo '```'
            echo "Pushed:    ${{ steps.tags.outputs.repo_uri }}:latest"
            echo "           ${{ steps.tags.outputs.repo_uri }}:sha-${{ steps.tags.outputs.short_sha }}"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
