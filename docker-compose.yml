services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: companybrain-postgres
    environment:
      POSTGRES_USER: companybrain
      POSTGRES_PASSWORD: companybrain
      POSTGRES_DB: companybrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companybrain"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
